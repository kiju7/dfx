<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5a6577"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a93a3"/>
    </marker>
    <style><![CDATA[
      .oval        { fill: #eef1f6; stroke: #5a6577; stroke-width: 1.5; }
      .triage      { fill: #fff8e1; stroke: #b38600; stroke-width: 1.5; }
      .lead        { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
      .group-bg    { fill: #fafbfc; stroke: #b0b6c0; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .final       { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 1.5; }
      .label       { fill: #1f2433; font-weight: 600; font-size: 14px; }
      .sub         { fill: #4a5364; font-size: 11px; }
      .arrow       { stroke: #5a6577; stroke-width: 1.8; fill: none; }
      .arrow-dash  { stroke: #8a93a3; stroke-width: 1.4; fill: none; stroke-dasharray: 5 3; }
      .branch-lbl  { fill: #5a6577; font-size: 11px; font-style: italic; }
      .footer      { fill: #4a5364; font-size: 11px; }
    ]]></style>
  </defs>

  <!-- 1. User request -->
  <ellipse cx="400" cy="38" rx="110" ry="22" class="oval"/>
  <text x="400" y="43" text-anchor="middle" class="label">사용자 요청</text>
  <path d="M 400,60 L 400,90" class="arrow" marker-end="url(#arrow)"/>

  <!-- 2. Triage -->
  <rect x="310" y="95" width="180" height="44" rx="8" class="triage"/>
  <text x="400" y="116" text-anchor="middle" class="label">🎯 Triage</text>
  <text x="400" y="132" text-anchor="middle" class="sub">분류 · 라우팅</text>
  <path d="M 400,139 L 400,168" class="arrow" marker-end="url(#arrow)"/>

  <!-- 3. Tech Lead — Plan -->
  <rect x="280" y="173" width="240" height="56" rx="8" class="lead"/>
  <text x="400" y="194" text-anchor="middle" class="label">📋 Tech Lead — Plan</text>
  <text x="400" y="210" text-anchor="middle" class="sub">코드 read → sub-task 분해</text>
  <text x="400" y="224" text-anchor="middle" class="sub">의도 모호 시 사용자에게 문의</text>
  <path d="M 400,229 L 400,265" class="arrow" marker-end="url(#arrow)"/>

  <!-- 4. Devs (group) -->
  <rect x="40" y="270" width="720" height="68" rx="8" class="group-bg"/>
  <text x="400" y="291" text-anchor="middle" class="label">⚒️ 7 Dev subagents · 병렬</text>
  <text x="400" y="310" text-anchor="middle" class="sub">frontend · backend · database · devops · daemon · ux · ai</text>
  <text x="400" y="326" text-anchor="middle" class="sub">(Same-role 직렬화 · brief 충돌 시 Tech Lead 와 SUGGEST_REVISION 협의)</text>
  <path d="M 400,338 L 400,367" class="arrow" marker-end="url(#arrow)"/>

  <!-- 5. QC (group) -->
  <rect x="80" y="372" width="640" height="66" rx="8" class="group-bg"/>
  <text x="400" y="393" text-anchor="middle" class="label">🔍 4 QC reviewers · 병렬</text>
  <text x="400" y="412" text-anchor="middle" class="sub">edgecase · security · perf · ux</text>
  <text x="400" y="428" text-anchor="middle" class="sub">(원본 요청 + dev WORK_SUMMARY context 받음)</text>

  <!-- Ralph 수렴: QC findings → Devs (우측 점선 루프) -->
  <path d="M 720,405 Q 778,405 778,304 L 760,304" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="785" y="345" text-anchor="start" class="branch-lbl">↻ Ralph</text>
  <text x="785" y="358" text-anchor="start" class="branch-lbl">findings → fix</text>
  <text x="785" y="371" text-anchor="start" class="branch-lbl">(0 까지 반복)</text>

  <path d="M 400,438 L 400,467" class="arrow" marker-end="url(#arrow)"/>

  <!-- 6. Tech Lead — Review -->
  <rect x="280" y="472" width="240" height="56" rx="8" class="lead"/>
  <text x="400" y="493" text-anchor="middle" class="label">🔎 Tech Lead — Review</text>
  <text x="400" y="509" text-anchor="middle" class="sub">의도 충족 · 일관성 · PR-품질</text>
  <text x="400" y="523" text-anchor="middle" class="sub">↺ same agent · APPROVE 까지 반복</text>

  <!-- Review REJECT → Devs (좌측 점선 루프) -->
  <path d="M 280,510 Q 22,510 22,304 L 40,304" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="28" y="400" class="branch-lbl">REJECT</text>
  <text x="28" y="413" class="branch-lbl">fix → re-QC</text>

  <path d="M 400,528 L 400,558" class="arrow" marker-end="url(#arrow)"/>

  <!-- 7. Final -->
  <ellipse cx="400" cy="580" rx="180" ry="22" class="final"/>
  <text x="400" y="585" text-anchor="middle" class="label">🏁 Summary + 📄 User Report</text>

  <!-- Footer -->
  <text x="400" y="640" text-anchor="middle" class="footer">
    조건부 분기 (요청에 따라 자동): 의도 모호 → 사용자 문의 ·
    모호 bug → dev/QC 재현 시도 (Investigation) · 검증 방식 선택지 묻기
  </text>
  <text x="400" y="660" text-anchor="middle" class="footer">
    model tiers · Triage = haiku · Tech Lead + Dev = opus · QC = sonnet
  </text>
  <text x="400" y="680" text-anchor="middle" class="footer">
    100% Claude Code 네이티브 · audit log → <tspan font-family="ui-monospace, monospace">_workspace/&lt;run-id&gt;/</tspan>
  </text>
</svg>
