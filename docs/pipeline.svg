<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 810" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5a6577"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a93a3"/>
    </marker>
    <style><![CDATA[
      .oval        { fill: #eef1f6; stroke: #5a6577; stroke-width: 1.5; }
      .triage      { fill: #fff8e1; stroke: #b38600; stroke-width: 1.5; }
      .lead        { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
      .invest      { fill: #f1f8e9; stroke: #558b2f; stroke-width: 1.5; stroke-dasharray: 4 2; }
      .fast        { fill: #f5f5f5; stroke: #757575; stroke-width: 1.5; stroke-dasharray: 4 2; }
      .dev         { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
      .qc          { fill: #fce4ec; stroke: #ad1457; stroke-width: 1.5; }
      .final       { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 1.5; }
      .group-bg    { fill: none; stroke: #b0b6c0; stroke-width: 1; stroke-dasharray: 3 3; }
      .label       { fill: #1f2433; font-weight: 600; }
      .sub         { fill: #4a5364; font-size: 11px; }
      .arrow       { stroke: #5a6577; stroke-width: 1.6; fill: none; }
      .arrow-dash  { stroke: #8a93a3; stroke-width: 1.4; fill: none; stroke-dasharray: 5 3; }
      .branch-lbl  { fill: #5a6577; font-size: 11px; font-style: italic; }
    ]]></style>
  </defs>

  <!-- 1. User request (oval) -->
  <ellipse cx="450" cy="40" rx="110" ry="22" class="oval"/>
  <text x="450" y="45" text-anchor="middle" class="label">사용자 요청</text>
  <path d="M 450,62 L 450,95" class="arrow" marker-end="url(#arrow)"/>

  <!-- 2. Triage -->
  <rect x="365" y="100" width="170" height="54" rx="8" class="triage"/>
  <text x="450" y="122" text-anchor="middle" class="label">🎯 Triage</text>
  <text x="450" y="140" text-anchor="middle" class="sub">Haiku · routing</text>

  <!-- Split arrows: direct / lead -->
  <path d="M 450,154 L 450,180 L 220,180 L 220,205" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 450,154 L 450,180 L 680,180 L 680,205" class="arrow" marker-end="url(#arrow)"/>
  <text x="290" y="175" class="branch-lbl">route = direct</text>
  <text x="540" y="175" class="branch-lbl">route = lead</text>

  <!-- 3a. Fast path (direct) -->
  <rect x="140" y="210" width="160" height="60" rx="8" class="fast"/>
  <text x="220" y="232" text-anchor="middle" class="label">🚀 fast path</text>
  <text x="220" y="250" text-anchor="middle" class="sub">single dev, no Tech Lead</text>

  <!-- 3b. Tech Lead (모든 모드 — 초기 plan / 재설계 / 사용자문의 / Investigation / Acceptance Review) -->
  <rect x="570" y="210" width="220" height="120" rx="8" class="lead"/>
  <text x="680" y="232" text-anchor="middle" class="label">📋 Tech Lead</text>
  <text x="680" y="250" text-anchor="middle" class="sub">Mode 1: 초기 plan (코드 read → 분해)</text>
  <text x="680" y="266" text-anchor="middle" class="sub">Mode 2: ask user (의도 모호 시)</text>
  <text x="680" y="282" text-anchor="middle" class="sub">Mode 3: revise (dev SUGGEST_REVISION)</text>
  <text x="680" y="298" text-anchor="middle" class="sub">Mode 4: Acceptance Review (QC clean 후)</text>
  <text x="680" y="314" text-anchor="middle" class="sub">Mode 5: Investigation (kind=bug 모호)</text>

  <!-- Tech Lead ↔ user (escalation indicator) -->
  <path d="M 680,210 L 680,180 L 820,180 L 820,40 L 560,40" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="830" y="115" class="branch-lbl" transform="rotate(0)">ask user</text>

  <!-- 3c. Investigation Phase (조건부, kind=bug 모호 시) -->
  <rect x="350" y="350" width="240" height="38" rx="6" class="invest"/>
  <text x="470" y="373" text-anchor="middle" class="label">🔬 Investigation (조건부)</text>
  <!-- Tech Lead → Investigation (dashed, 조건부) -->
  <path d="M 680,330 L 680,348 Q 680,368 590,369" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <!-- Investigation → Tech Lead (REPRO_REPORTs 받고 다시) -->
  <path d="M 350,369 Q 270,369 270,265 L 570,265" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="280" y="360" class="branch-lbl">REPRO_REPORT</text>

  <!-- Merge to devs row (Tech Lead Mode 1/3/4-REJECT → Dev) -->
  <path d="M 220,270 L 220,410 L 450,410" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 680,330 L 680,410 L 450,410" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 450,410 L 450,435" class="arrow" marker-end="url(#arrow)"/>
  <text x="710" y="395" class="branch-lbl">plan / REJECT fix</text>

  <!-- 4. Dev subagents group -->
  <rect x="40" y="450" width="820" height="92" rx="6" class="group-bg"/>
  <text x="450" y="470" text-anchor="middle" class="label">⚒️ Dev subagents · 병렬 (Same-role 직렬화)</text>

  <rect x="60"  y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="110" y="510" text-anchor="middle" class="label">frontend</text>

  <rect x="170" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="220" y="510" text-anchor="middle" class="label">backend</text>

  <rect x="280" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="330" y="510" text-anchor="middle" class="label">database</text>

  <rect x="390" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="440" y="510" text-anchor="middle" class="label">devops</text>

  <rect x="500" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="550" y="510" text-anchor="middle" class="label">daemon</text>

  <rect x="610" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="660" y="510" text-anchor="middle" class="label">ux</text>

  <rect x="720" y="485" width="100" height="42" rx="6" class="dev"/>
  <text x="770" y="510" text-anchor="middle" class="label">ai</text>

  <!-- SUGGEST_REVISION feedback loop (dev → Tech Lead) -->
  <path d="M 60,505 Q 20,505 20,265 L 570,265" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="25" y="385" class="branch-lbl">SUGGEST_REVISION</text>

  <!-- Arrow to QC -->
  <path d="M 450,542 L 450,572" class="arrow" marker-end="url(#arrow)"/>

  <!-- 5. QC reviewers group -->
  <rect x="100" y="580" width="700" height="92" rx="6" class="group-bg"/>
  <text x="450" y="600" text-anchor="middle" class="label">🔍 QC reviewers · 4명 병렬 (의도 context 전달)</text>

  <rect x="135" y="615" width="140" height="42" rx="6" class="qc"/>
  <text x="205" y="640" text-anchor="middle" class="label">edgecase</text>

  <rect x="290" y="615" width="140" height="42" rx="6" class="qc"/>
  <text x="360" y="640" text-anchor="middle" class="label">security</text>

  <rect x="445" y="615" width="140" height="42" rx="6" class="qc"/>
  <text x="515" y="640" text-anchor="middle" class="label">perf</text>

  <rect x="600" y="615" width="140" height="42" rx="6" class="qc"/>
  <text x="670" y="640" text-anchor="middle" class="label">ux</text>

  <!-- Ralph 수렴 loop-back: QC findings → Dev -->
  <path d="M 800,635 Q 870,635 870,505 L 820,505" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="800" y="570" text-anchor="end" class="branch-lbl">↻ Ralph 수렴 — findings → dev (fix → re-QC)</text>
  <text x="800" y="585" text-anchor="end" class="branch-lbl">findings 0 까지 · 동일 2회 = STUCK</text>

  <!-- QC clean → Tech Lead (back UP, Mode 4 review 호출) -->
  <path d="M 800,635 Q 890,635 890,305 L 790,305" class="arrow-dash" marker-end="url(#arrow-dashed)"/>
  <text x="895" y="500" class="branch-lbl" transform="rotate(-90 895,500)">QC clean → Tech Lead (Mode 4)</text>

  <!-- Tech Lead → Final (APPROVE, 왼쪽 큰 곡선) -->
  <path d="M 570,280 Q 30,280 30,725 L 290,725" class="arrow" marker-end="url(#arrow)"/>
  <text x="40" y="425" class="branch-lbl">APPROVE → Final</text>

  <!-- 7. Final summary (oval) -->
  <ellipse cx="450" cy="725" rx="160" ry="22" class="final"/>
  <text x="450" y="730" text-anchor="middle" class="label">🏁 consolidated summary + 📄 user report</text>

  <!-- Footer caption -->
  <text x="450" y="775" text-anchor="middle" class="sub">병렬 = 같은 어시스턴트 메시지의 Task 호출 N 개 · 외부 서비스 없음 (Claude Code 네이티브)</text>
  <text x="450" y="791" text-anchor="middle" class="sub">model: Triage = haiku · Tech Lead + Dev = opus · QC = sonnet · audit log: _workspace/&lt;run-id&gt;/</text>
</svg>
